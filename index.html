<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Carlos Ortiz · Carrera</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090F;--s1:#0D1020;--s2:#131828;--bd:#1C2340;--bd2:#242C4A;
  --tx:#F0F4FF;--mt:#3D4870;--mt2:#252E50;
  --gold:#F5C842;--go2:#FFE080;--red:#E83560;--grn:#28D470;--blu:#3E8EF0;--pur:#9060F5;--org:#F07830;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(245,200,66,.06),transparent 60%),radial-gradient(ellipse 40% 30% at 80% 80%,rgba(62,142,240,.04),transparent 60%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}

/* ── HEADER ── */
#hdr{position:sticky;top:0;z-index:100;background:rgba(7,9,15,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd)}
#hdr-in{max-width:960px;margin:0 auto;padding:0 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;height:58px}
.logo{display:flex;align-items:center;gap:11px}
.logo-icon{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--org));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 0 16px rgba(245,200,66,.25)}
.logo-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.06em;color:var(--gold);line-height:1}
.logo-sub{font-size:9px;color:var(--mt);letter-spacing:.14em;text-transform:uppercase;margin-top:1px}
/* Top nav desktop */
#top-nav{display:flex;gap:2px}
.tn{padding:7px 13px;border-radius:7px;border:none;cursor:pointer;font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;background:transparent;color:var(--mt);font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap}
.tn.on{background:rgba(245,200,66,.15);color:var(--gold)}
.tn:hover:not(.on){color:var(--tx);background:var(--s2)}
/* Bottom nav mobile */
#bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(7,9,15,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);justify-content:space-around;padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;border:none;background:transparent;color:var(--mt);cursor:pointer;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.bn.on{color:var(--gold)}
.bn-i{font-size:22px;line-height:1.1}

/* ── MAIN ── */
#main{max-width:960px;margin:0 auto;padding:22px 18px 40px;position:relative;z-index:1}
.view{display:none}.view.on{display:block}

/* ── SECTION TITLE ── */
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.14em;color:var(--mt);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--bd),transparent)}

/* ── HERO STATS ── */
.hero{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.hcard{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:18px 16px;position:relative;overflow:hidden;text-align:center}
.hcard::before{content:'';position:absolute;inset:0;background:var(--hc,transparent);opacity:.04;border-radius:16px}
.hcard-bar{position:absolute;top:0;left:0;right:0;height:3px;background:var(--hc,var(--gold))}
.hcard-val{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;color:var(--hc,var(--gold));margin:6px 0 4px}
.hcard-lbl{font-size:10px;font-weight:700;color:var(--mt);letter-spacing:.1em;text-transform:uppercase}
.hcard-sub{font-size:11px;color:var(--mt);margin-top:4px}

/* ── SEASON TABLE ── */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:16px;overflow:hidden;margin-bottom:18px}
.card-hdr{padding:13px 18px;border-bottom:1px solid var(--bd);background:var(--s2);display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.08em;color:var(--tx)}
.card-meta{font-size:10px;color:var(--mt)}
.ovx{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 14px;color:var(--gold);font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--bd);background:rgba(7,9,15,.6);text-align:center;white-space:nowrap}
th:first-child{text-align:left}
td{padding:10px 14px;text-align:center;border-bottom:1px solid rgba(28,35,64,.5);white-space:nowrap}
td:first-child{text-align:left;font-weight:700}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(13,16,32,.6)}
tr.subtotal td{background:rgba(245,200,66,.05);border-top:1px solid rgba(245,200,66,.15);font-weight:800;color:var(--gold)}
tr.subtotal td:first-child{font-size:11px}
tr.grandtotal td{background:rgba(144,96,245,.08);border-top:2px solid rgba(144,96,245,.4);font-weight:900;font-size:13px;color:var(--go2)}
.comp-icon{font-size:13px;margin-right:4px}
.prom-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800}
.vnum{font-family:'Bebas Neue',sans-serif;font-size:16px}
.vnum.g{color:var(--gold)}
.vnum.b{color:var(--blu)}
.vnum.gr{color:var(--grn)}

/* ── CHART ── */
.chart-wrap{position:relative;height:200px;padding:16px}

/* ── PALMARES ── */
.palm-summary{display:flex;gap:8px;flex-wrap:wrap;padding:16px 18px;border-bottom:1px solid var(--bd)}
.palm-badge{background:var(--s2);border:1px solid var(--bd2);border-radius:9px;padding:6px 13px;display:flex;align-items:center;gap:7px;cursor:default}
.palm-badge-cnt{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1}
.palm-badge-lbl{font-size:10px;color:var(--mt);line-height:1.3;max-width:70px}
.palm-total{margin-left:auto;background:linear-gradient(135deg,rgba(245,200,66,.1),rgba(144,96,245,.1));border:1px solid rgba(245,200,66,.3)}

.trophy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:16px}
.trophy-card{background:var(--s2);border:1px solid var(--bd2);border-radius:13px;padding:14px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;transition:border-color .2s}
.trophy-card:hover{border-color:var(--tc,var(--gold))}
.trophy-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--tc,var(--gold))}
.trophy-icon{font-size:28px;flex-shrink:0;line-height:1}
.trophy-name{font-weight:800;font-size:13px;line-height:1.2}
.trophy-club{font-size:11px;margin-top:3px;font-weight:600}
.trophy-seas{font-size:10px;color:var(--mt);margin-top:2px}

.award-section{border-top:1px solid var(--bd);padding:14px 18px}
.award-title-row{font-size:10px;font-weight:800;color:var(--pur);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.award-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.award-card{background:var(--s2);border:1px solid rgba(144,96,245,.3);border-radius:13px;padding:14px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.award-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pur),transparent)}
.award-icon{font-size:28px;flex-shrink:0}
.award-name{font-weight:800;font-size:13px;color:var(--pur)}
.award-seas{font-size:10px;color:var(--mt);margin-top:2px}
.award-detail{font-size:11px;color:var(--mt);margin-top:2px}

/* ── CARRERA / TIMELINE ── */
.club-block{margin-bottom:20px}
.club-hdr{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--bd);background:var(--s2)}
.club-icon{font-size:24px;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.club-name-big{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.04em}
.club-years{font-size:11px;color:var(--mt);margin-top:1px}
.club-totals{display:flex;gap:8px;flex-wrap:wrap;padding:12px 18px;border-bottom:1px solid var(--bd)}
.ct-pill{background:var(--bg);border:1px solid var(--bd2);border-radius:8px;padding:7px 12px;text-align:center;flex:1;min-width:70px}
.ct-v{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1}
.ct-l{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

/* ── SELECC ── */
.nat-bar{display:flex;align-items:center;gap:14px;padding:16px 18px;flex-wrap:wrap}
.nat-flag-big{font-size:32px}
.nat-info{flex:1;min-width:120px}
.nat-name-big{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em;color:var(--grn)}
.nat-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.np{background:var(--bg);border:1px solid var(--bd2);border-radius:8px;padding:7px 11px;text-align:center;min-width:65px}
.npv{font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1}
.npl{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.07em}

/* ── EDIT MODE ── */
.edit-toggle{padding:7px 14px;border-radius:8px;border:1px solid var(--bd2);background:transparent;color:var(--mt);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.05em;text-transform:uppercase}
.edit-toggle.active{border-color:var(--gold);color:var(--gold);background:rgba(245,200,66,.08)}
.editable{border:none;background:transparent;color:var(--tx);font-family:'Bebas Neue',sans-serif;font-size:16px;width:52px;text-align:center;border-radius:5px;padding:2px 3px;-moz-appearance:textfield}
.editable::-webkit-inner-spin-button{-webkit-appearance:none}
.editable:focus{outline:none;background:rgba(245,200,66,.1);color:var(--gold)}
.editable:disabled{cursor:default}
.edit-hint{font-size:10px;color:var(--gold);margin-left:8px;opacity:0;transition:opacity .2s}
.edit-hint.show{opacity:1}
.saved-flash{color:var(--grn);font-size:11px;margin-left:8px;opacity:0;transition:opacity .3s}
.saved-flash.show{opacity:1}

/* Promo color helpers */
.p-hi{color:var(--grn)}
.p-md{color:var(--gold)}
.p-lo{color:var(--org)}
.p-no{color:var(--mt)}

/* ── FOOTER ── */
#footer{text-align:center;padding:20px 0 6px;color:var(--mt2);font-size:9px;letter-spacing:.1em;text-transform:uppercase}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #top-nav{display:none}
  #bot-nav{display:flex}
  body{padding-bottom:70px}
  #footer{padding-bottom:76px}
  #main{padding:14px 12px 30px}
  #hdr-in{height:52px;padding:0 14px}
  .logo-name{font-size:19px}
  .logo-icon{width:32px;height:32px;font-size:15px}
  .hero{grid-template-columns:repeat(2,1fr);gap:8px}
  .hcard{padding:14px 12px}
  .hcard-val{font-size:34px}
  th,td{padding:8px 10px;font-size:11px}
  .trophy-grid{grid-template-columns:1fr 1fr;padding:12px;gap:8px}
  .trophy-card{padding:11px;gap:9px}
  .trophy-icon{font-size:22px}
  .trophy-name{font-size:12px}
  .palm-summary{padding:12px 14px;gap:6px}
  .palm-badge{padding:5px 10px}
  .palm-badge-cnt{font-size:18px}
  .club-totals{padding:10px 14px;gap:6px}
  .award-grid{grid-template-columns:1fr 1fr}
  .card-hdr{padding:10px 14px}
  .sec-title{font-size:11px}
  .chart-wrap{height:170px;padding:12px}
}
@media(max-width:480px){
  .hero{grid-template-columns:1fr 1fr}
  .hcard-val{font-size:30px}
  .trophy-grid{grid-template-columns:1fr}
  .award-grid{grid-template-columns:1fr}
  th,td{padding:7px 8px;font-size:10px}
  .editable{width:44px;font-size:14px}
  .palm-summary{gap:5px}
  .palm-badge-lbl{font-size:9px;max-width:60px}
}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-in">
    <div class="logo">
      <div class="logo-icon">⚽</div>
      <div>
        <div class="logo-name">CARLOS ORTIZ</div>
        <div class="logo-sub">Modo Carrera · FIFA 26</div>
      </div>
    </div>
    <div id="top-nav">
      <button class="tn on"  onclick="sw('stats')">📊 Stats</button>
      <button class="tn"     onclick="sw('carrera')">🌐 Carrera</button>
      <button class="tn"     onclick="sw('palmares')">🏆 Palmarés</button>
    </div>
  </div>
</div>

<div id="main">

  <!-- ═══ STATS ═══ -->
  <div id="view-stats" class="view on">

    <!-- Chart -->
    <div class="sec-title">📈 Evolución por temporada</div>

      <div class="chart-wrap"><canvas id="chart-main"></canvas></div>
    </div>

    <!-- Stats table by season & competition -->
    <div class="card" id="stats-table">
      <div class="card-hdr">
        <span class="card-title">⚽ Desglose por Temporada &amp; Competición</span>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="saved-flash" id="saved-txt">✓ Guardado</span>
          <span class="edit-hint" id="edit-hint">Toca los números para editar</span>
          <button class="edit-toggle" id="edit-btn" onclick="toggleEdit()">✏️ Editar</button>
        </div>
      </div>
      <div class="ovx" id="stats-body"></div>
    </div>

  </div>

  <!-- ═══ CARRERA ═══ -->
  <div id="view-carrera" class="view">
    <div id="career-body"></div>
  </div>

  <!-- ═══ PALMARES ═══ -->
  <div id="view-palmares" class="view">
    <div class="card" id="palmares-body"></div>
  </div>

</div>

<div id="bot-nav">
  <button class="bn on"  id="bn-stats"    onclick="sw('stats')">   <span class="bn-i">📊</span>Stats</button>
  <button class="bn"     id="bn-carrera"  onclick="sw('carrera')"> <span class="bn-i">🌐</span>Carrera</button>
  <button class="bn"     id="bn-palmares" onclick="sw('palmares')"><span class="bn-i">🏆</span>Palmarés</button>
</div>

<div id="footer">CARLOS ORTIZ · MODO CARRERA FIFA 26 · Datos guardados en tu dispositivo</div>

// ─── STATE ─────────────────────────────────────────────────────────────────
var D; // loaded data
var editMode = false;
var chartInst = null;

function save(){ try{localStorage.setItem(SK, JSON.stringify(D));}catch(e){} }
function load(){
  try{
    var r = JSON.parse(localStorage.getItem(SK)||'null');
    if(r && r.seasons) D = r; else throw 0;
  } catch(e){
    D = { seasons: JSON.parse(JSON.stringify(DEFAULT_DATA)), selecc: SELECC };
  }
  if(!D.selecc) D.selecc = SELECC;
}

// ─── CALC ──────────────────────────────────────────────────────────────────
function seasTotals(s){ // sum all comps in a season
  var p=0,g=0;
  s.comps.forEach(function(c){p+=c.p||0;g+=c.g||0;});
  return{p:p,g:g,prom:p>0?g/p:0};
}
function clubTotals(clubName){
  var p=0,g=0;
  D.seasons.forEach(function(s){if(s.club===clubName){var t=seasTotals(s);p+=t.p;g+=t.g;}});
  return{p:p,g:g,prom:p>0?g/p:0};
}
function careerTotals(){
  var p=0,g=0;
  D.seasons.forEach(function(s){var t=seasTotals(s);p+=t.p;g+=t.g;});
  p+=D.selecc.p; g+=D.selecc.g;
  return{p:p,g:g,prom:p>0?g/p:0};
}
function promClass(v){ return v>=1?'p-hi':v>=0.7?'p-md':v>=0.4?'p-lo':'p-no'; }
function promColor(v){ return v>=1?'#28D470':v>=0.7?'#F5C842':v>=0.4?'#F07830':'#3D4870'; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── NAV ───────────────────────────────────────────────────────────────────
function sw(v){
  ['stats','carrera','palmares'].forEach(function(k){
    document.getElementById('view-'+k).classList.toggle('on', k===v);
    // top nav
    document.querySelectorAll('.tn').forEach(function(b,i){
      b.classList.toggle('on', ['stats','carrera','palmares'][i]===v);
    });
    // bottom nav
    var bn=document.getElementById('bn-'+k);
    if(bn) bn.classList.toggle('on', k===v);
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

  editMode = !editMode;

  btn.textContent = editMode ? '✅ Listo' : '✏️ Editar';

function onEdit(sni, ci, field, val){
  var v = parseInt(val)||0; if(v<0)v=0;
  D.seasons[sni].comps[ci][field] = v;

}

// ─── CHART ─────────────────────────────────────────────────────────────────
function renderChart(){
  var labels = D.seasons.map(function(s){return s.sn.replace('20','').replace('/','/')});
  var gData  = D.seasons.map(function(s){return seasTotals(s).g;});
  var pData  = D.seasons.map(function(s){return seasTotals(s).p;});
  var prData = D.seasons.map(function(s){var t=seasTotals(s);return t.p?parseFloat((t.g/t.p).toFixed(2)):0;});
  if(chartInst){chartInst.destroy();chartInst=null;}
  chartInst = new Chart(document.getElementById('chart-main').getContext('2d'),{
    type:'bar',
    data:{labels:labels, datasets:[
      {label:'Goles', data:gData, backgroundColor:'rgba(245,200,66,.75)', borderColor:'#F5C842', borderWidth:1.5, borderRadius:5, yAxisID:'y'},
      {label:'Partidos', data:pData, backgroundColor:'rgba(62,142,240,.25)', borderColor:'#3E8EF0', borderWidth:1.5, borderRadius:5, yAxisID:'y'},
      {label:'Promedio', data:prData, type:'line', borderColor:'#9060F5', backgroundColor:'transparent', borderWidth:2.5, pointRadius:4, pointBackgroundColor:'#9060F5', tension:0.3, yAxisID:'y2'},
    ]},
    options:{responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#3D4870',font:{size:10}}},
        tooltip:{backgroundColor:'#0D1020',borderColor:'#1C2340',borderWidth:1,titleColor:'#3D4870',bodyColor:'#F0F4FF'}},
      scales:{
        y:{position:'left', ticks:{color:'#3D4870',font:{size:9}}, grid:{color:'#1C2340'}, border:{display:false}, beginAtZero:true},
        y2:{position:'right', ticks:{color:'#9060F5',font:{size:9},callback:function(v){return v.toFixed(1);}}, grid:{display:false}, border:{display:false}, min:0, max:1.5},
        x:{ticks:{color:'#3D4870',font:{size:9}}, grid:{display:false}, border:{display:false}},

    }
  });
}

  var awHtml = '<div class="award-section">'
             + '<div class="award-title-row">🏅 Premios Individuales</div>'
             + '<div class="award-grid">'
             + AWARDS.map(function(a){
                 return '<div class="award-card">'
                      + '<div class="award-icon">'+a.i+(a.n>1?'<span style="font-size:11px;color:'+a.c+';font-weight:900;font-family:\'Bebas Neue\',sans-serif"> x'+a.n+'</span>':'')+'</div>'
                      + '<div><div class="award-name" style="color:'+a.c+'">'+esc(a.name)+'</div>'
                      + '<div class="award-seas">'+esc(a.seasons)+'</div>'
                      + '<div class="award-detail">'+esc(a.detail)+'</div></div></div>';
               }).join('')
             + '</div></div>';

  document.getElementById('palmares-body').innerHTML =
    '<div class="card-hdr"><span class="card-title">🏆 Palmarés · Carlos Ortiz</span>'
    +'<span class="card-meta">'+total+' títulos · '+AWARDS.reduce(function(a,x){return a+x.n;},0)+' premios ind.</span></div>'
    + summaryHtml
    + sectionLbl('🏟️ Títulos de Club — '+clubTrs.reduce(function(a,t){return a+t.n;},0))
    + trophyCards(clubTrs)
    + sectionLbl('🌎 Títulos con Selección — '+natTrs.reduce(function(a,t){return a+t.n;},0))
    + trophyCards(natTrs)
    + awHtml;
}

load();
renderHero();
renderChart();
renderStatsTable();
renderCareer();
renderPalmares();
